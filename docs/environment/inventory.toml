# docs/environment/inventory.toml
# Desired-state manifest — the reproduction target for a new machine.
# env_inventory.py renders inventory.md from THIS file and --checks live state against it.
# Edit this toml; never hand-edit inventory.md. Versions are best-effort references, not pins.

[meta]
snapshot_date = "2026-07-12"
# status enum: present | ported | native | not-applicable | claude-only

[[plugins]]
name = "khenrix-utils"
source = "local:~/git/khenrix-utils"
version = "local"
components = ["skills", "hooks"]
claude = "present"
codex = "present"
agy = "present"
portability = "already cross-CLI via reconcile"

[[plugins]]
name = "superpowers"
source = "gh:anthropics/claude-plugins-official"
version = "6.1.1"
components = ["skills", "hooks"]
claude = "present"
codex = "native"
agy = "ported"
portability = "codex uses native plugin; skills ported to agy only; hooks claude-only"

[[plugins]]
name = "claude-obsidian"
source = "local:~/git/obsidian-vault"
version = "local"
components = ["skills", "commands", "hooks", "agents"]
claude = "present"
codex = "ported"
agy = "ported"
portability = "non-wiki skills ported; wiki set OUT of scope; commands/hooks/agents claude-only"

[[plugins]]

[[mcp]]
name = "github"
transport = "n/a"
owner = "bootstrap"
secret = false
xor_exempt = true
claude = "not-applicable"
codex = "native"
agy = "not-applicable"
portability = "codex-native enhancement; no MCP/plugin counterpart on Claude (gh CLI + codex bridge)"

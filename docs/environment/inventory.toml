# ---- MCP servers ----

[[mcp]]
name = "context7"
transport = "http"
owner = "reconcile"
secret = false
claude = "present"
codex = "present"
agy = "present"

[[mcp]]
name = "vercel"
transport = "stdio"
owner = "reconcile"
secret = false
claude = "present"
codex = "present"
agy = "present"

[[mcp]]
# DECOMMISSIONED 2026-07-20: redundant with the native claude.ai Drive MCP, and its
# command hardcoded ~/.asdf/installs/nodejs/26.2.0/bin/node, which the mise migration
# deletes. Removed from capabilities.toml and from all three live CLI configs.
name = "google-drive-DECOMMISSIONED"
transport = "stdio"
owner = "reconcile"
secret = true
claude = "present"
codex = "present"
agy = "present"

[[mcp]]
name = "chrome-devtools"
transport = "stdio"
owner = "reconcile"
secret = false
claude = "present"
codex = "present"
agy = "present"
portability = "host-os-conditional: Windows PowerShell command shape (WSL interop)"

[[mcp]]
name = "linkedin"
transport = "stdio"
owner = "reconcile"
secret = false
claude = "present"
codex = "present"
agy = "present"
portability = "interactive per-machine login; no stored credential (UV_HTTP_TIMEOUT is tuning)"

[[mcp]]
name = "slack"
transport = "stdio"
owner = "bootstrap"
secret = false
native_equiv = "slack"
claude = "present"
codex = "native"
agy = "ported"
portability = "session-scoped rotating token; interactive re-auth per session; codex uses native plugin"

[[mcp]]
name = "codebase-memory-mcp"
transport = "stdio"
owner = "bootstrap"
secret = false
claude = "present"
codex = "ported"
agy = "ported"
portability = "local on-disk store path — see auth-and-secrets.md"

[[mcp]]
name = "playwright"
transport = "stdio"
owner = "bootstrap"
secret = false
claude = "plugin-provided"
codex = "ported"
agy = "ported"
portability = "claude: provided by the playwright plugin (not in mcp config); codex/agy: standalone MCP"

[[mcp]]
name = "openaiDeveloperDocs"
transport = "http"
owner = "bootstrap"
secret = false
claude = "not-applicable"
codex = "present"
agy = "not-applicable"
portability = "codex-only HTTP docs MCP"

[[mcp]]
name = "gmail"
transport = "oauth-connector"
owner = "bootstrap"
secret = false
claude = "connector"
codex = "not-applicable"
agy = "not-applicable"
portability = "claude.ai OAuth connector — claude-only"

[[mcp]]
name = "calendar"
transport = "oauth-connector"
owner = "bootstrap"
secret = false
claude = "connector"
codex = "not-applicable"
agy = "not-applicable"
portability = "claude.ai OAuth connector — claude-only"

[[mcp]]
name = "drive-connector"
transport = "oauth-connector"
owner = "bootstrap"
secret = false
claude = "connector"
codex = "not-applicable"
agy = "not-applicable"
